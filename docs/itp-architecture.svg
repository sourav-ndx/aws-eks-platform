<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#8C4FFF" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#58a6ff" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#ED7100" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-k" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#E7157B" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#7AA116" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#8b98a9" stroke-width="1.6" stroke-linecap="round"/></marker>
    <marker id="ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#527FFF" stroke-width="1.6" stroke-linecap="round"/></marker>
  </defs>

  <rect x="0" y="0" width="1400" height="960" fill="#0B1220"/>

  <text x="40" y="48" fill="#E6EDF3" font-size="26" font-weight="600">ITP AWS Platform — EKS Reference Architecture</text>
  <text x="40" y="74" fill="#8b98a9" font-size="14">Multi-AZ EKS · zero long-lived credentials (OIDC + IRSA) · CloudWatch observability · GitHub Actions CI/CD</text>

  <!-- AWS Cloud -->
  <rect x="250" y="95" width="1110" height="790" rx="14" fill="#0F1830" stroke="#33415a" stroke-width="1.5"/>
  <text x="272" y="122" fill="#8b98a9" font-size="14" font-weight="600">AWS Cloud — us-east-1</text>

  <!-- EKS Control Plane -->
  <rect x="1080" y="140" width="250" height="85" rx="10" fill="#1a1408" stroke="#ED7100" stroke-width="1.5"/>
  <text x="1205" y="172" fill="#f2a35c" font-size="16" font-weight="600" text-anchor="middle">EKS control plane</text>
  <text x="1205" y="194" fill="#b98a5c" font-size="12" text-anchor="middle">AWS managed · API server, etcd</text>

  <!-- VPC -->
  <rect x="290" y="140" width="740" height="615" rx="12" fill="#131022" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="310" y="166" fill="#b9a3ff" font-size="14" font-weight="600">VPC 10.0.0.0/16</text>

  <!-- Public subnets -->
  <rect x="320" y="185" width="680" height="135" rx="10" fill="#101a10" stroke="#3F8624" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="336" y="207" fill="#7fb96a" font-size="12" font-weight="600">Public subnets — 10.0.1.0/24 · 10.0.2.0/24 (us-east-1a / 1b)</text>

  <rect x="360" y="222" width="190" height="80" rx="8" fill="#1b1030" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="455" y="256" fill="#c9b3ff" font-size="17" font-weight="600" text-anchor="middle">ALB</text>
  <text x="455" y="278" fill="#8d7bc0" font-size="11.5" text-anchor="middle">TLS · Ingress-managed</text>

  <rect x="750" y="222" width="190" height="80" rx="8" fill="#1b1030" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="845" y="256" fill="#c9b3ff" font-size="15" font-weight="600" text-anchor="middle">NAT gateway</text>
  <text x="845" y="278" fill="#8d7bc0" font-size="11.5" text-anchor="middle">egress only</text>

  <!-- IGW on VPC edge -->
  <rect x="255" y="245" width="72" height="50" rx="8" fill="#1b1030" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="291" y="275" fill="#c9b3ff" font-size="13.5" font-weight="600" text-anchor="middle">IGW</text>

  <!-- Private subnets -->
  <rect x="320" y="360" width="680" height="225" rx="10" fill="#0e1626" stroke="#2f6fd1" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="336" y="382" fill="#6ba3e8" font-size="12" font-weight="600">Private subnets — 10.0.16.0/20 · 10.0.32.0/20 (no inbound internet)</text>

  <!-- Node A -->
  <rect x="350" y="395" width="290" height="165" rx="8" fill="#1a1207" stroke="#ED7100" stroke-width="1.5"/>
  <text x="495" y="420" fill="#f2a35c" font-size="14" font-weight="600" text-anchor="middle">EKS node — us-east-1a</text>
  <text x="495" y="440" fill="#b98a5c" font-size="11" text-anchor="middle">t3.medium · VPC CNI pod IPs</text>
  <rect x="372" y="470" width="115" height="60" rx="7" fill="#2a1a08" stroke="#f2a35c" stroke-width="1"/>
  <text x="430" y="496" fill="#ffd9ad" font-size="12.5" font-weight="600" text-anchor="middle">ITP pod</text>
  <text x="430" y="514" fill="#c79b6b" font-size="10.5" text-anchor="middle">10.0.17.x</text>
  <rect x="502" y="470" width="115" height="60" rx="7" fill="#2a1a08" stroke="#f2a35c" stroke-width="1"/>
  <text x="560" y="496" fill="#ffd9ad" font-size="12.5" font-weight="600" text-anchor="middle">ITP pod</text>
  <text x="560" y="514" fill="#c79b6b" font-size="10.5" text-anchor="middle">10.0.18.x</text>

  <!-- Node B -->
  <rect x="690" y="395" width="290" height="165" rx="8" fill="#1a1207" stroke="#ED7100" stroke-width="1.5"/>
  <text x="835" y="420" fill="#f2a35c" font-size="14" font-weight="600" text-anchor="middle">EKS node — us-east-1b</text>
  <text x="835" y="440" fill="#b98a5c" font-size="11" text-anchor="middle">t3.medium · VPC CNI pod IPs</text>
  <rect x="712" y="470" width="115" height="60" rx="7" fill="#2a1a08" stroke="#f2a35c" stroke-width="1"/>
  <text x="770" y="496" fill="#ffd9ad" font-size="12.5" font-weight="600" text-anchor="middle">ITP pod</text>
  <text x="770" y="514" fill="#c79b6b" font-size="10.5" text-anchor="middle">10.0.33.x</text>
  <rect x="842" y="470" width="115" height="60" rx="7" fill="#2a1a08" stroke="#f2a35c" stroke-width="1"/>
  <text x="900" y="496" fill="#ffd9ad" font-size="12.5" font-weight="600" text-anchor="middle">ITP pod</text>
  <text x="900" y="514" fill="#c79b6b" font-size="10.5" text-anchor="middle">10.0.34.x</text>

  <!-- RDS -->
  <rect x="430" y="625" width="230" height="95" rx="8" fill="#0d1430" stroke="#527FFF" stroke-width="1.5"/>
  <text x="545" y="662" fill="#9db8ff" font-size="15" font-weight="600" text-anchor="middle">RDS — MySQL</text>
  <text x="545" y="684" fill="#6c82c4" font-size="11.5" text-anchor="middle">DB subnets · SG allows pods only</text>

  <!-- Right column -->
  <rect x="1080" y="280" width="250" height="85" rx="10" fill="#1c0c14" stroke="#E7157B" stroke-width="1.5"/>
  <text x="1205" y="312" fill="#ff8fc0" font-size="15" font-weight="600" text-anchor="middle">CloudWatch</text>
  <text x="1205" y="334" fill="#b0678c" font-size="11.5" text-anchor="middle">Container Insights · Logs</text>

  <rect x="1080" y="405" width="250" height="85" rx="10" fill="#131a08" stroke="#7AA116" stroke-width="1.5"/>
  <text x="1205" y="437" fill="#b5d178" font-size="15" font-weight="600" text-anchor="middle">S3</text>
  <text x="1205" y="459" fill="#84a04e" font-size="11.5" text-anchor="middle">test artifacts (IRSA access)</text>

  <rect x="1080" y="530" width="250" height="85" rx="10" fill="#1a1408" stroke="#ED7100" stroke-width="1.5"/>
  <text x="1205" y="562" fill="#f2a35c" font-size="15" font-weight="600" text-anchor="middle">ECR</text>
  <text x="1205" y="584" fill="#b98a5c" font-size="11.5" text-anchor="middle">container images</text>

  <!-- Users -->
  <rect x="50" y="225" width="140" height="90" rx="10" fill="#10161f" stroke="#8b98a9" stroke-width="1.5"/>
  <text x="120" y="263" fill="#dbe4ee" font-size="15" font-weight="600" text-anchor="middle">Users</text>
  <text x="120" y="285" fill="#8b98a9" font-size="11.5" text-anchor="middle">HTTPS</text>

  <!-- GitHub Actions -->
  <rect x="50" y="790" width="180" height="90" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="140" y="826" fill="#9ecbff" font-size="15" font-weight="600" text-anchor="middle">GitHub Actions</text>
  <text x="140" y="848" fill="#6b91b8" font-size="11.5" text-anchor="middle">OIDC · no AWS keys</text>

  <!-- FLOW LINES -->
  <!-- users -> IGW -> ALB -->
  <line x1="190" y1="270" x2="251" y2="270" stroke="#58a6ff" stroke-width="1.6" marker-end="url(#ar-b)"/>
  <line x1="329" y1="268" x2="356" y2="264" stroke="#58a6ff" stroke-width="1.6" marker-end="url(#ar-b)"/>
  <!-- ALB -> nodes -->
  <path d="M440 302 C440 348, 495 348, 495 391" fill="none" stroke="#8C4FFF" stroke-width="1.6" marker-end="url(#ar-p)"/>
  <path d="M470 302 C470 348, 835 336, 835 391" fill="none" stroke="#8C4FFF" stroke-width="1.6" marker-end="url(#ar-p)"/>
  <!-- node B -> NAT egress -->
  <line x1="898" y1="393" x2="884" y2="306" stroke="#8b98a9" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ar-w)"/>
  <!-- pods -> RDS -->
  <path d="M495 560 C495 596, 520 596, 520 621" fill="none" stroke="#527FFF" stroke-width="1.6" marker-end="url(#ar-r)"/>
  <path d="M835 560 C835 622, 700 672, 664 672" fill="none" stroke="#527FFF" stroke-width="1.6" marker-end="url(#ar-r)"/>
  <!-- node -> CloudWatch -->
  <path d="M980 450 C1042 450, 1050 328, 1076 323" fill="none" stroke="#E7157B" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar-k)"/>
  <!-- pods -> S3 -->
  <path d="M980 500 C1040 500, 1046 450, 1076 447" fill="none" stroke="#7AA116" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar-g)"/>
  <!-- ECR -> node (pull) -->
  <path d="M1080 572 C1020 572, 1002 522, 984 508" fill="none" stroke="#ED7100" stroke-width="1.6" marker-end="url(#ar-o)"/>
  <!-- control plane <-> nodes -->
  <path d="M1205 225 L1205 248 L1055 248 L1055 415 L988 415" fill="none" stroke="#8b98a9" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ar-w)"/>
  <!-- GitHub -> ECR -->
  <path d="M232 832 L1150 832 Q1205 832 1205 790 L1205 621" fill="none" stroke="#ED7100" stroke-width="1.6" marker-end="url(#ar-o)"/>
  <text x="620" y="822" fill="#b98a5c" font-size="11.5">docker build + push · OIDC federated credentials</text>

  <!-- ANIMATED TRAFFIC DOTS -->
  <circle r="5" fill="#58a6ff"><animateMotion dur="2.6s" repeatCount="indefinite" path="M190 270 L438 264"/></circle>
  <circle r="4.5" fill="#8C4FFF"><animateMotion dur="2.2s" repeatCount="indefinite" path="M440 302 C440 348, 495 348, 495 391"/></circle>
  <circle r="4.5" fill="#8C4FFF"><animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M470 302 C470 348, 835 336, 835 391"/></circle>
  <circle r="4.5" fill="#527FFF"><animateMotion dur="2.4s" repeatCount="indefinite" path="M495 560 C495 596, 520 596, 520 621"/></circle>
  <circle r="4.5" fill="#527FFF"><animateMotion dur="2.8s" begin="0.8s" repeatCount="indefinite" path="M835 560 C835 622, 700 672, 664 672"/></circle>
  <circle r="4.5" fill="#E7157B"><animateMotion dur="2.6s" repeatCount="indefinite" path="M980 450 C1042 450, 1050 328, 1076 323"/></circle>
  <circle r="4.5" fill="#7AA116"><animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite" path="M980 500 C1040 500, 1046 450, 1076 447"/></circle>
  <circle r="4.5" fill="#ED7100"><animateMotion dur="5.5s" repeatCount="indefinite" path="M232 832 L1150 832 Q1205 832 1205 790 L1205 621"/></circle>
  <circle r="4.5" fill="#ED7100"><animateMotion dur="2.4s" repeatCount="indefinite" path="M1080 572 C1020 572, 1002 522, 984 508"/></circle>

  <!-- LEGEND -->
  <circle cx="48" cy="925" r="5" fill="#58a6ff"/><text x="60" y="930" fill="#8b98a9" font-size="12">user traffic</text>
  <circle cx="175" cy="925" r="5" fill="#8C4FFF"/><text x="187" y="930" fill="#8b98a9" font-size="12">ALB → pod IPs (VPC CNI)</text>
  <circle cx="390" cy="925" r="5" fill="#527FFF"/><text x="402" y="930" fill="#8b98a9" font-size="12">app → RDS</text>
  <circle cx="510" cy="925" r="5" fill="#ED7100"/><text x="522" y="930" fill="#8b98a9" font-size="12">CI/CD · image pull</text>
  <circle cx="665" cy="925" r="5" fill="#E7157B"/><text x="677" y="930" fill="#8b98a9" font-size="12">logs &amp; metrics (Fluent Bit)</text>
  <circle cx="880" cy="925" r="5" fill="#8b98a9"/><text x="892" y="930" fill="#8b98a9" font-size="12">control plane / egress</text>
</svg>
